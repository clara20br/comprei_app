name: comprou_app
description: A grocery shopping list app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & State Management
  provider: ^6.0.5
  flutter_slidable: ^3.0.1
  
  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.1.0
  
  # Utilities
  intl: ^0.18.1
  path_provider: ^2.1.0
  file_picker: ^6.1.1
  shared_preferences: ^2.2.2
  math_expressions: ^2.4.0
  
  # Image
  image_picker: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true